<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #0f172a; margin: 0; padding: 50px; display: flex; justify-content: center; }
    .scene { position: relative; width: 800px; height: 800px; border: 1px solid red; }
    .item { position: absolute; }
    
    .packets-wrapper {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 4;
      clip-path: polygon(0% 0%, 100% 0%, 100% 64.5%, 0% 47.8%);
      background: rgba(255, 0, 0, 0.2); 
    }
  </style>
</head>
<body>
  <div class="scene">
    <img src="/product/mbox.png" class="item" style="width: 100%; bottom: 0; left: 0; z-index: 3; opacity: 0.8;" />
    <div class="packets-wrapper"></div>
  </div>
</body>
</html>
